name: Performance Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: false

    - name: Build
      run: go build -v -o logprism ./cmd/logprism

    - name: Generate Test Data
      run: go run scripts/gen_perf_data.go

    - name: Run Performance Test
      run: |
        /usr/bin/time -f "%e" ./logprism -input perf_1m.log > /dev/null 2> bench_time.txt
        RESULT=$(cat bench_time.txt)
        echo "LATEST_TIME=$RESULT" >> $GITHUB_ENV
        echo "Benchmark took $RESULT seconds"

    - name: Update PERFORMANCE.md
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        DATE=$(date +'%b %d, %Y')
        TIME_VAL=${{ env.LATEST_TIME }}
        TIME_RESULT="$TIME_VAL seconds"
        
        # Calculate Throughput: 1,000,000 / TIME_VAL
        # Use bc for floating point math if needed, but for lines/sec scale=0 is fine
        TPS=$(echo "1000000 / $TIME_VAL" | bc)
        # Format with commas (e.g. 980,392) using printf or simple sed
        # Note: ubuntu printf doesn't always support %'d without LC_NUMERIC
        TPS_FORMATTED=$(printf "%d" $TPS | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta')
        THROUGHPUT="~$TPS_FORMATTED lines per second"
        
        # Use sed to replace content in docs/PERFORMANCE.md
        sed -i "s|<!-- LATEST_RESULT -->.*<!-- /LATEST_RESULT -->|<!-- LATEST_RESULT -->**$TIME_RESULT**<!-- /LATEST_RESULT -->|g" docs/PERFORMANCE.md
        sed -i "s|<!-- LATEST_THROUGHPUT -->.*<!-- /LATEST_THROUGHPUT -->|<!-- LATEST_THROUGHPUT -->$THROUGHPUT<!-- /LATEST_THROUGHPUT -->|g" docs/PERFORMANCE.md
        sed -i "s|<!-- LATEST_DATE -->.*<!-- /LATEST_DATE -->|<!-- LATEST_DATE -->$DATE<!-- /LATEST_DATE -->|g" docs/PERFORMANCE.md
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add docs/PERFORMANCE.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update latest cloud benchmark results [skip ci]" && git push)
